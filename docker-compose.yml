services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: mapu
      POSTGRES_PASSWORD: mapu
      POSTGRES_DB: mapu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
